<!DOCTYPE html>
<html>
<head>
<meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<link rel="icon" href="/favicon.ico" type="image/x-icon">
<title>APPanel</title>
<!-- ═══════════ STYLE ═══════════ -->
<style>
:root{--bg:#1c1e26;--fg:#cdd3de;--card-bg:rgba(36,40,54,.78);--border:#7a7a8a;--title:#7ab8ff;--btn-bg:#2c2f3a;--btn-fg:#cdd3de;--sub-k:#9aa2b0;--l-color:#e8ecf4;--gb-bg:#2c2f3a;--gb-border:#b0b0b8;--gd-color:#9aa2b0;--th-btn-border:#3c3f4a;--th-btn-fg:#9aa2b0;--th-on:#7ab8ff;--scroll-thumb:#3c3f4a;--tr-hover:rgba(255,255,255,.04);--p0:#7a7a8a;--p1:#6ec6e8;--p2:#8ed8a0;--p3:#9aa2b0}
.light{--bg:#ffffff;--fg:#1f2328;--card-bg:rgba(246,248,250,.75);--border:#d0d7de;--title:#0969da;--btn-bg:#e8eaed;--btn-fg:#1f2328;--sub-k:#656d76;--l-color:#1f2328;--gb-bg:#e8eaed;--gb-border:#d0d7de;--gd-color:#656d76;--th-btn-border:#d0d7de;--th-btn-fg:#656d76;--th-on:#0969da;--scroll-thumb:#d0d7de;--tr-hover:rgba(0,0,0,.03);--p0:#6e7781;--p1:#0969da;--p2:#1a7f37;--p3:#656d76}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--fg);display:flex;flex-direction:column;user-select:none;-webkit-user-select:none}
.top{height:110px;display:flex;flex-direction:column;padding:6px 12px 0;flex-shrink:0;}
.bot{flex:1;display:flex;gap:8px;padding:0 12px 12px;min-height:0;margin-top:10px}
.lf{width:20%;max-width:200px;background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:10px;overflow:hidden;display:flex;flex-direction:column;gap:4px;-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px)}

/* 头部标题 */
.hdr{display:flex;justify-content:space-between;align-items:center;height:30px;flex-shrink:0;overflow:hidden;margin-bottom:4px}
.hdr h1{font-size:16px;color:var(--title);font-weight:700;white-space:nowrap;line-height:1}
.hdr .btns{display:flex;gap:4px}
.hdr .btns button{background:var(--btn-bg);border:1px solid var(--border);color:var(--btn-fg);padding:3px 8px;border-radius:5px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;width:100px;height:25px;line-height:1;display:inline-flex;align-items:center;justify-content:center}
.hdr .btns button:hover{border-color:var(--title)}
.hdr .btns .active{border-color:var(--title);color:var(--title)}
.hdr .btns .danger{animation:dangerBreath 1.2s ease-in-out infinite;border-color:#ef4444;color:#ef4444}
.hdr .btns .scroff{border-color:#facc15;color:#facc15}
@keyframes dangerBreath{0%,100%{box-shadow:0 0 3px #ef4444}50%{box-shadow:0 0 14px #ef4444}}
.hdr .btns .safe{animation:safeBreath 1.2s ease-in-out infinite;border-color:#4ade80;color:#4ade80}
@keyframes safeBreath{0%,100%{box-shadow:0 0 3px #4ade80}50%{box-shadow:0 0 14px #4ade80}}

/* sub 仪表盘网格 */
.sub{height:80px;display:flex;flex-wrap:wrap;gap:4px;overflow:hidden;flex-shrink:0;align-items:center;justify-content:flex-start}
.sub-w{display:flex;gap:8px;flex:1;min-height:0;flex-shrink:0}
#sub1{flex:0 1 auto}
#sub2{flex:1;justify-content:flex-end}
.si{background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:5px 8px;text-align:center;height:56px;display:flex;flex-direction:column;align-items:center;justify-content:center;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
.si .k{font-size:10px;color:var(--sub-k);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.si .v{font-size:14px;font-weight:600}
.l{font-size:22px;color:var(--l-color);font-weight:700}
.g{border:1px solid var(--border);border-radius:6px;padding:6px;flex:1;display:flex;flex-direction:column;align-items:center;text-align:center;justify-content:center;animation:breath 3s ease-in-out infinite;-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px)}
@keyframes breath{0%,100%{box-shadow:0 0 4px color-mix(in srgb,var(--title) 15%,transparent)}50%{box-shadow:0 0 16px color-mix(in srgb,var(--title) 40%,transparent)}}
.gr{display:flex;justify-content:center;align-items:baseline;margin-bottom:3px}
.gn{font-size:22px;font-weight:700}
.gb{height:8px;min-width:100px;background:var(--gb-bg);border:1px solid var(--gb-border);border-radius:3px;overflow:hidden}
.gf{height:100%;border-radius:2px;transition:width .5s ease;position:relative;overflow:hidden;background:linear-gradient(90deg,#86efac,#fde68a,#fca5a5,#c4b5fd,#86efac);background-size:400% 100%;animation:flow 4s linear infinite}
@keyframes flow{0%{background-position:0 0}100%{background-position:400% 0}}

.gd{font-size:9px;color:var(--gd-color);margin-top:2px;white-space:pre-wrap;overflow:hidden}
.g2{display:flex;gap:6px}
.g2>div{flex:1}
.g2 .gn{font-size:14px;font-weight:700}
@keyframes br{0%{opacity:.2}100%{opacity:.7}}
.rt{flex:1;background:var(--card-bg);border:1px solid var(--border);border-radius:10px;padding:6px;display:flex;flex-direction:column;overflow:hidden}
.th{display:flex;gap:2px;margin-bottom:4px;flex-shrink:0}
.th button{background:transparent;border:1px solid var(--th-btn-border);color:var(--th-btn-fg);padding:1px 4px;border-radius:3px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;text-align:center;white-space:nowrap;width:60px;height:30px}
.th .on{border-color:var(--th-on);color:var(--th-on)}
.tb{flex:1;overflow-y:auto;min-height:0}
.tb::-webkit-scrollbar{width:3px}
.tb::-webkit-scrollbar-thumb{background:var(--scroll-thumb);border-radius:2px}
.tb table{width:100%;border-collapse:collapse;font-size:11px}
.tb td{padding:1px 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;height:20px;line-height:18px}
.tb tr:hover td{background:var(--tr-hover)}
.p0{width:50px;text-align:right;color:var(--p0)}
.p1{width:50px;text-align:right;color:var(--p1)}
.p2{width:50px;text-align:right;color:var(--p2)}
.p3{color:var(--p3);font-size:10px;overflow:hidden;text-overflow:ellipsis;max-width:70px}
.p4{color:var(--p3);font-size:10px;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:2px}
.p4 .cpText{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;flex:1}
.p4 .cpBtn{flex:none;cursor:pointer;font-size:10px;opacity:.4;padding:0 2px;transition:opacity .15s}
.p4 .cpBtn:hover{opacity:1}
#floatOverlay,#cfgOverlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:200;justify-content:center;align-items:center;padding:8px}

/* 移动端布局 */
@media(max-width:768px){
body{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:auto 1fr;gap:0 4px;padding:2px 4px 48px;overflow:hidden}
.top{display:contents}
.hdr{grid-column:1/-1;height:auto;margin-bottom:2px;padding:0}
.hdr h1{font-size:13px;line-height:1.2;display:none}
.hdr .btns{display:none}
.sub-w{grid-column:1;grid-row:2;display:flex;flex-direction:column;gap:4px;min-height:0}
.sub{display:flex;flex-direction:column;gap:1px;padding:3px;background:var(--card-bg);border:1px solid var(--border);border-radius:10px;-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);overflow-y:auto;height:auto;min-height:0}
.sub-w>.sub{max-width:none}
#sub1{flex:4}
#sub2{flex:3}
.si{padding:2px 4px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;flex:1;width:100%!important;min-height:0}
.si .k{font-size:10px;font-weight:700;color:var(--fg);line-height:1.4}
.si .v{font-size:12px;text-align:center;line-height:1.4}
.bot{grid-column:2;grid-row:2;padding:0;margin:0;flex-direction:column;overflow:hidden;min-height:0}
.lf{width:100%;max-width:none;padding:4px;gap:2px;flex-direction:column;flex:1;min-height:0}
.lf>.g{width:100%;flex:1!important;padding:2px 4px}
.rt{display:none}
.g{animation:none}
.g .l{font-size:12px;line-height:1.2}
.gn{font-size:14px;line-height:1.2}
.g2 .gn{font-size:11px}
#netChart{height:32px!important}
#cpu_freq_bg{font-size:22px!important;right:-2px!important;bottom:-4px!important}
.bmb{display:flex;position:fixed;bottom:0;left:0;right:0;height:44px;background:var(--card-bg);border-top:1px solid var(--border);z-index:100;padding:4px 6px;gap:3px;align-items:center;justify-content:center;flex-shrink:0;-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px)}
.bmb button{background:var(--btn-bg);border:1px solid var(--border);color:var(--btn-fg);padding:3px 6px;border-radius:5px;font-size:11px;font-weight:700;cursor:pointer;height:30px;white-space:nowrap;flex:1;max-width:80px;line-height:1;display:inline-flex;align-items:center;justify-content:center}
.bmb .safe{animation:safeBreath 1.2s ease-in-out infinite;border-color:#4ade80;color:#4ade80}
.bmb .danger{animation:dangerBreath 1.2s ease-in-out infinite;border-color:#ef4444;color:#ef4444}
.bmb .scroff{border-color:#facc15;color:#facc15}
.bmb .active{border-color:var(--title);color:var(--title)}
#floatOverlay,#cfgOverlay{padding:4px}
#fc1,#fc2{width:100%!important;height:92%!important}
}
.cfg-tbl{width:100%;border-collapse:collapse;font-size:12px}
.t-float{display:none;position:absolute;top:56px;left:4px;z-index:100;background:var(--bg);border:1px solid #ef4444;border-radius:6px;padding:6px 12px;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.25);font-size:12px;line-height:1.5;pointer-events:none}
.cfg-tbl td{padding:3px 4px!important}
.cfg-tbl input{padding:4px 6px!important;font-size:13px!important}
/* 开关滑块 */
.toggleSlider::before{content:"";position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:3px;left:3px;transition:.3s}
.cfgToggle:checked+.toggleSlider::before{transform:translateX(22px)}
/* 隐藏原生滚动条 */
.scroll-hide::-webkit-scrollbar{display:none}
.scroll-hide{scrollbar-width:none;-ms-overflow-style:none}
/* 自定义浮动滚动条 - 水滴风格 */
.f-scroll{position:absolute;top:4px;right:3px;width:5px;bottom:4px;pointer-events:none;z-index:50;opacity:0;transition:opacity .25s ease}
.f-scroll.show{pointer-events:auto;opacity:1}
.f-scroll .thumb{width:5px;border-radius:3px;background:var(--scroll-thumb);position:absolute;top:0;left:0;min-height:24px;cursor:pointer;pointer-events:auto;transition:background .2s,transform .2s,box-shadow .2s;box-shadow:0 0 6px rgba(0,0,0,.15)}
.f-scroll .thumb:hover{background:var(--p3);transform:scaleX(1.4);box-shadow:0 0 10px rgba(0,0,0,.2)}
.f-scroll .thumb:active{background:var(--title);transform:scaleX(1.6);box-shadow:0 0 14px rgba(0,0,0,.3)}
</style>
<!-- ═══════════ HTML ═══════════ -->
</head>
<body>

<div class=top>
<div class=hdr>
<h1 id=title style=cursor:pointer;user-select:none title="点击修改标题">APPanel-仪表盘</h1>
<div class=btns>
<button id=btnTheme style=width:80px;height:25px;font-size:13px;font-weight:700>&#9728;&#65039; &#27973;&#33394;</button><button id=btnCfg style=width:60px;height:25px;font-size:12px>设置</button><button id=btnAP style=width:120px;height:25px;font-size:12px>访问AzurPilot</button><button id=btnScreen style=width:100px;height:25px;font-size:12px>访问息屏服务</button>
</div>
</div>
<div class=sub-w style=position:relative>
<div class=sub id=sub1></div>
<div class=sub id=sub2></div>
<div id=cpuFloat class=t-float><span style=color:#ef4444>⚠️</span> 长期超70°C有脱焊风险</div>
<div id=btFloat class=t-float><span style=color:#facc15>⚠️</span> 超 50°C半小时将杀AP</div>
</div>
</div>
</div>

<div class=bot>
<div class=lf id=left></div>
<div class=rt id=right></div>
</div>

<div id=floatOverlay>
<div id=fc1 style="background:var(--card-bg);border:1px solid var(--border);border-radius:8px;display:flex;flex-direction:column;overflow:hidden;width:420px;height:360px;box-shadow:0 8px 32px rgba(0,0,0,.3)">
<div style="display:flex;align-items:center;padding:8px 10px;background:var(--btn-bg);border-bottom:1px solid var(--border);flex-shrink:0">
<span style="font-size:14px;margin-right:8px;opacity:.6">&#9776;</span><span style="font-size:13px;font-weight:600;color:var(--fg);flex:1">进程列表</span><button id=btnFloatClose style="background:none;border:none;color:var(--p3);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center">✕</button>
</div>
<div style="flex:1;padding:8px;display:flex;flex-direction:column;min-height:0;overflow:hidden">
<div class=th><button class=on id=mpb0>PID</button><button id=mpb1>CPU</button><button id=mpb2>内存</button><button id=mpb3>应用</button><button id=mpb4>包名</button></div>
<div class=tb><table><tbody id=mproc></tbody></table></div>
</div>
</div>
</div>

<div id=cfgOverlay>
<div id=fc2 style="background:var(--card-bg);border:1px solid var(--border);border-radius:8px;display:flex;flex-direction:column;overflow:hidden;width:680px;height:520px;box-shadow:0 8px 32px rgba(0,0,0,.3)">
<div style="display:flex;align-items:center;padding:8px 10px;background:var(--btn-bg);border-bottom:1px solid var(--border);flex-shrink:0">
<span style="font-size:14px;margin-right:8px;opacity:.6">&#9881;</span><span style="font-size:13px;font-weight:600;color:var(--fg);flex:1">设置 &mdash; settings.json</span><button id=btnCfgClose style="background:none;border:none;color:var(--p3);width:28px;height:28px;border-radius:6px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center">✕</button>
</div>
<div style="flex:1;padding:8px;display:flex;flex-direction:column;min-height:0;overflow:hidden;gap:4px">
<div style=display:flex;flex:1;min-height:0;gap:6px>
<div style="position:relative;width:140px;flex:none">
<div id=cfgSide class=scroll-hide style="overflow-y:auto;font-size:12px;display:flex;flex-direction:column;gap:2px;height:100%"></div>
<div class="f-scroll" id=cfgSideBar><div class=track><div class=thumb id=cfgSideThumb></div></div></div>
</div>
<div style="flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;position:relative">
<div id=cfgBody class=scroll-hide style="flex:1;overflow-y:auto;min-height:0"></div>
<div class="f-scroll" id=cfgBodyBar><div class=track><div class=thumb id=cfgBodyThumb></div></div></div>
</div>
</div>
<div style=display:flex;gap:6px;flex-shrink:0>
<button id=btnCfgAddRow style="flex:none;background:var(--btn-bg);border:1px dashed var(--border);color:var(--th-on);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600">+ 新增条目</button>
<button id=btnQuickAdd style="display:none;background:var(--btn-bg);border:1px solid var(--border);color:var(--btn-fg);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px">📱 当前前台</button>
<div style=flex:1></div>
<button id=btnCfgSave style="background:var(--th-on);border:none;color:var(--bg);padding:6px 20px;border-radius:6px;cursor:pointer;font-weight:700;font-size:12px;transition:all .15s">保存</button>
<button id=btnCfgCancel style="background:transparent;border:1px solid var(--border);color:var(--btn-fg);padding:6px 20px;border-radius:6px;cursor:pointer;font-size:12px;transition:all .15s">取消</button>
</div>
<div id=cfgMsg style=font-size:11px;margin-top:2px;min-height:18px;padding:2px 4px></div>
</div>
</div>
</div>

<!-- ═══════════ SCRIPT ═══════════ -->
<script>
var _cache={},_ws=null,_ready=false, _so=1, _soDir=1, _netHistory=[], _netMax=180, _dOk=false, _netLoop=0, _netInterp={from:{rx:0,tx:0},to:{rx:0,tx:0},t0:0,dur:500};
// CPU jiffies 状态（前端计算占用率）
var _cpuPrev=null; // {raw, total, idle}
var _procCache={raw:"",list:[]}; // 进程列表缓存，仅 ps_raw 变化时重解析
var _procDirty=false; // 数据变更标记，触发 HTML 重建
var _procHtmlCache={html:"",sortKey:""}; // 进程表 HTML 缓存，避免每帧重建 DOM
var _lastSortKey=""; // 上一次排序键
var _renderTimer=null; // render 防抖定时器
function _debouncedRender(){if(_renderTimer)clearTimeout(_renderTimer);_renderTimer=setTimeout(function(){_renderTimer=null;render()},50)}
// 网络状态（前端计算速率和总量）
var _netState={rx:0,tx:0,t:0};
var _netLastFormatted={nv:undefined,nu:"B/s",tv:undefined,tu:"B/s"};
// 前端计算状态（CPU jiffies、网络字节数等）
var _prevJiffies=null,_prevNet={rx:0,tx:0,ts:0},_netInit={rx0:0,tx0:0};
var _settingsMap={packages:{}};

function checkD(){
  var ap=document.getElementById("btnAP");
  var scr=document.getElementById("btnScreen");
  var mbAP=document.getElementById("mBtnAP");
  var mbScr=document.getElementById("mBtnScr");
  if(_cache.ap_online===true){
    if(ap){ap.className="safe";_dOk=true}
    if(mbAP){mbAP.className="safe"}
  }else if(_cache.ap_online===false){
    if(ap){ap.className="danger";_dOk=false}
    if(mbAP){mbAP.className="danger"}
  }else{
    if(ap){ap.className="";_dOk=false}
    if(mbAP){mbAP.className=""}
  }
  // 息屏服务（由后端 TCP 检测端口 20000）
  if(_cache.screen_online===true){if(scr)scr.className="safe";if(mbScr)mbScr.className="safe"}
  else if(_cache.screen_online===false){if(scr)scr.className="danger";if(mbScr)mbScr.className="danger"}
  else if(scr)scr.className=""
}

// 事件委托：统一处理 DOM 点击
document.body.addEventListener("click",function(e){
  var t=e.target,id=t.id;
  if(id==="btnTheme"){toggleTheme();return}
  if(id==="btnCfg"||id==="btnCfgClose"||id==="btnCfgCancel"){toggleCfg();return}
  if(id==="btnAP"||id==="mBtnAP"){window.open("http://"+location.hostname+":22267","_blank");return}
  if(id==="btnScreen"||id==="mBtnScr"){window.open("http://"+location.hostname+":20000","_blank");return}
  if(id==="title"){var n=prompt("请输入新标题:",t.textContent);if(n&&n.trim())t.textContent=n.trim();return}
  if(id==="btnFloatClose"){toggleFloat();return}
  if(id==="btnCfgSave"){saveCfg();return}
  if(id==="btnCfgAddRow"){cfgAddRow();return}
  if(id==="btnQuickAdd"){cfgQuickAdd();return}
  // 进程表头排序
  if(id&&id.match(/^pb\d$|^mpb\d$/)){ps(parseInt(id.slice(-1)));return}
  // 设置侧边栏导航
  if(t.closest("#cfgSide")){var key=t.closest("[id^=cfgSide_]");if(key)cfgSelectTab(key.id.replace("cfgSide_",""))}
  // 移动端底部按钮
  if(id==="mBtnTheme"){toggleTheme();return}
  if(id==="mBtnCfg"){toggleCfg();return}
  if(id==="mBtnP"){toggleFloat();return}
  // KILL 按钮
  if(t.classList.contains("btnKill")){
    killProc(t.getAttribute("data-pid"),t.getAttribute("data-pkg"));return
  }
  // 进程表行点击复制包名
  var row=t.closest(".procRow");
  if(row){doCopy(row.getAttribute("data-cl")||"");return}
});

// 温度警告浮动提示（hover 显示）
document.body.addEventListener("mouseenter",function(e){
  var el=e.target.closest("#si5,#si6");
  if(!el)return;
  var isCpu=el.id==="si5";
  var f=document.getElementById(isCpu?"cpuFloat":"btFloat");
  if(f)f.style.display="block"
});
document.body.addEventListener("mouseleave",function(e){
  var el=e.target.closest("#si5,#si6");
  if(!el)return;
  var isCpu=el.id==="si5";
  var f=document.getElementById(isCpu?"cpuFloat":"btFloat");
  if(f){
    var v=parseFloat(document.getElementById(isCpu?"s5":"s6")?.textContent||"0");
    var threshold=isCpu?70:40;
    if(v<=threshold)f.style.display="none"
  }
});



function setTheme(t){
  document.body.classList.toggle("light",t==="light");
  var labels={dark:"☀️ 浅色",light:"🌙 深色"};
  var b=document.getElementById("btnTheme");
  if(b)b.textContent=labels[t]||"☀️ 浅色";
  var mb=document.getElementById("mBtnTheme");
  if(mb)mb.textContent=labels[t]||"☀️ 浅色"
}
function toggleTheme(){
  var cur=document.body.classList.contains("light")?"light":"dark";
  setTheme(cur==="dark"?"light":"dark")
}

var _anim={};
function animNum(id,val,suf,dec){
  var el=document.getElementById(id);if(!el)return;
  if(_anim['t'+id])cancelAnimationFrame(_anim['t'+id]);
  var m=el.textContent.match(/^[\d.]+/);
  var from=m?parseFloat(m[0]):val;
  if(from===val){el.textContent=val+(suf||'');return}
  var t0=performance.now(),dur=200;
  function tick(){
    var p=Math.min((performance.now()-t0)/dur,1);
    var e=1-Math.pow(1-p,3);
    var cur=from+(val-from)*e;
    el.textContent=(dec!==undefined?cur.toFixed(dec):Math.round(cur))+(suf||'');
    if(p<1)_anim['t'+id]=requestAnimationFrame(tick)
  }
  _anim['t'+id]=requestAnimationFrame(tick)
}

  fetch("/api/kill",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)})
    .then(function(r){return r.json()})
    .then(function(d){
      document.getElementById("cfgMsg").textContent=d.results?d.results.join("; "):(d.message||"kill 完成");

function saveCfg(){

  var curKey=groups[window._cfgTab];

  if(curKey==="ports"){savePorts();return}
  if(curKey==="collect_speeds"){
    var speeds={};

      var sel=document.querySelector('input[name=cs_'+c+']:checked');
      if(sel)speeds[c]=parseFloat(sel.value)
    }
    window._cfgData.collect_speeds=speeds;
    // 继续执行下面的保存逻辑
  }else if(curKey==="autostart"){
    // 从开关收集
    var autoData={};
    document.querySelectorAll(".cfgToggle").forEach(function(cb){autoData[cb.dataset.key]=cb.checked});
    window._cfgData[curKey]=autoData
  }else{
    var rows=document.querySelectorAll("#cfgBody table tr");
    var curData={};
    for(var i=1;i<rows.length;i++){
      var ki=rows[i].querySelector(".cfgKey");
      var vi=rows[i].querySelector(".cfgVal");
      if(ki&&ki.value.trim())curData[ki.value.trim()]=vi?vi.value.trim():""
    }
    window._cfgData[curKey]=curData
  }
  var full={};
  for(var i=0;i<groups.length;i++)full[groups[i]]=window._cfgData[groups[i]]||{};
  var m=document.getElementById("cfgMsg");m.textContent="保存中...";m.style.color="";
  fetch("/api/config",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({content:JSON.stringify(full,null,2)})}).then(function(r){return r.json()}).then(function(d){
    m.textContent=d.message;m.style.color=d.status==="ok"?"#4ade80":"#ef4444";cfgRenderSide();cfgRenderTable()
  }).catch(function(e){m.textContent="保存失败: "+e;m.style.color="#ef4444"})
}

// 自定义浮动滚动条
function initScroll(containerId, barId, thumbId){
  var c=document.getElementById(containerId),b=document.getElementById(barId),t=document.getElementById(thumbId);
  if(!c||!b||!t)return;
  function upd(){var r=c.scrollHeight-c.clientHeight;if(r>0){var p=c.scrollTop/r;t.style.top=Math.min(p*(c.clientHeight-30),c.clientHeight-30)+"px";b.classList.add("show")}else{b.classList.remove("show")}}
  c.addEventListener("scroll",upd);
  // 拖拽
  var _drag=0;
  t.addEventListener("mousedown",function(e){e.stopPropagation();_drag=1;var sy=e.clientY,st=parseFloat(t.style.top)||0;function mm(ev){if(!_drag)return;var y=st+(ev.clientY-sy);var max=c.clientHeight-30;t.style.top=Math.max(0,Math.min(y,max))+"px";c.scrollTop=(y/max)*(c.scrollHeight-c.clientHeight)}function mu(){_drag=0;document.removeEventListener("mousemove",mm);document.removeEventListener("mouseup",mu)}document.addEventListener("mousemove",mm);document.addEventListener("mouseup",mu)});
  // 点击轨道
  b.querySelector(".track").addEventListener("click",function(e){if(e.target===t)return;var r=e.clientY-b.getBoundingClientRect().top;var max=c.clientHeight-30;var y=Math.max(0,Math.min(r-max/2,max));t.style.top=y+"px";c.scrollTop=(y/max)*(c.scrollHeight-c.clientHeight)});
  upd();var obs=new MutationObserver(upd);obs.observe(c,{childList:true,subtree:true,attributes:true});window.addEventListener("resize",upd)
}

function fmtBytes(x){
  if(x>=1073741824)return(x/1073741824).toFixed(1)+"GB";
  if(x>=1048576)return(x/1048576).toFixed(1)+"MB";
  if(x>=1024)return(x/1024).toFixed(1)+"KB";
  return x+"B"
}

function render(){
  var d=_cache, pkgMap=d._pkg_map||{};
  
  // ── 前台应用（原始包名 → 映射表解析）──
  var fgName = d.fg_pkg&&d.fg_pkg!="?" ? (pkgMap[d.fg_pkg]||d.fg_pkg) : "-";
  ud("s0",fgName);
  var _s0=document.getElementById("s0");if(_s0&&d.fg_pkg)_s0.title=d.fg_pkg;
  // 设备、系统
  ud("s1",d.brand&&d.dn&&d.dn.indexOf("Failure")<0?d.brand+" "+d.dn:(d.md||"-"));
  ud("s2",d.av||"-");
  // 电池：原始 bt_raw 0-100
  if(d.bt_raw!==undefined)animNum("s3",d.bt_raw,"%");else ud("s3","-");
  // 运行时间
  if(d.startup_ts&&!window._uptimeBase)window._uptimeBase={ts:d.startup_ts*1000};
  if(window._uptimeBase){
    var _el=Math.floor((Date.now()-window._uptimeBase.ts)/1000), _ts=_el%60;
    var _tm=Math.floor(_el/60)%60,_th=Math.floor(_el/3600)%24,_td=Math.floor(_el/86400)%7,_tw=Math.floor(_el/604800);
    var _parts=[];
    if(_tw)_parts.push(_tw+"周");if(_td)_parts.push(_td+"天");
    if(_th||_parts.length)_parts.push(_th+"时");if(_tm||_parts.length)_parts.push(_tm+"分");_parts.push(_ts+"秒");
    document.getElementById("s4").textContent=_parts.join("")
  }
  // CPU 温度：原始 ct_raw millidegree → °C
  if(d.ct_raw!==undefined){
    var cv=d.ct_raw/1000;animNum("s5",cv,"°C",1);
    document.getElementById("cpuFloat").style.display=cv>70?"block":"none"
  }else ud("s5","-");
  // 电池温度：原始 btt_raw 十分位 → °C
  if(d.btt_raw!==undefined){
    var bv=d.btt_raw/10;animNum("s6",bv,"°C",1);
    document.getElementById("btFloat").style.display=bv>40?"block":"none"
  }else ud("s6","-");
  
  // ── CPU ──
  if(d.cpu_jiffies){
    var parts=d.cpu_jiffies.split(" ").map(Number);
    var total=parts.reduce(function(a,b){return a+b},0), idle=parts[3];
    if(_cpuPrev&&_cpuPrev.raw!==d.cpu_jiffies){
      var dt=total-_cpuPrev.total, di=idle-_cpuPrev.idle;
      var cpuPct=dt>0?Math.round((1-di/dt)*100):0;
      // /proc/stat 第一行已是全核合计，cpuPct 就是总使用率
      animNum("cpu_v",cpuPct,"%");
      var _sub=document.getElementById("cpu_sub");
      if(_sub){
        var _active=Array.isArray(d.freqs_khz)?d.freqs_khz.filter(function(f){return f>0}).length:(d.cc?parseInt(d.cc):0);
        _sub.textContent=_active?_active+"核活跃":""
      }
      var c=document.getElementById("cpu_f");if(c)c.style.width=Math.min(cpuPct,100)+"%"
    }
    if(_cpuPrev===null||_cpuPrev.raw!==d.cpu_jiffies)_cpuPrev={raw:d.cpu_jiffies,total:total,idle:idle}
  }else ud("cpu_v","-");
  ud("cpu_d",d.cpu_model||"-");

  
  // ── 内存：原始 mem_kb ──
  if(d.mem_kb){
    var usedKb=d.mem_kb-d.mem_avail_kb, memPct=Math.round(usedKb/d.mem_kb*100);
    animNum("mem_v",memPct,"%",1);
    ud("mem_d",Math.round(usedKb/1024)+"MB / "+Math.round(d.mem_kb/1024)+"MB");
    var mf=document.getElementById("mem_f");if(mf)mf.style.width=Math.min(memPct,100)+"%"
  }else ud("mem_v","-");
  
  // ── 存储：原始 sto_total_kb ──
  if(d.sto_total_kb){
    var stoUsed=d.sto_used_kb||(d.sto_total_kb-d.sto_avail_kb), stoPct=Math.round(stoUsed/d.sto_total_kb*100);
    animNum("sto_v",stoPct,"%");
    ud("sto_d",fmtBytes(stoUsed*1024)+" / "+fmtBytes(d.sto_total_kb*1024));
    var sf=document.getElementById("sto_f");if(sf)sf.style.width=Math.min(stoPct,100)+"%"
  }else ud("sto_v","-");
  ud("sto_project",d.project_bytes?"项目 "+fmtBytes(d.project_bytes):"");
  
  // ── 网络：原始 net_rx/net_tx + 服务端总量 ──
  if(d.net_rx!==undefined){
    var now=Date.now();
    var elapsed=(now-_netState.t)/1000;
    if(elapsed>0.3){
      var nr=Math.max(0,(d.net_rx-_netState.rx)/elapsed), nt=Math.max(0,(d.net_tx-_netState.tx)/elapsed);
      _netState.rx=d.net_rx;_netState.tx=d.net_tx;_netState.t=now;
      var _fr=function(x){for(var _u of[[1073741824,"GB/s"],[1048576,"MB/s"],[1024,"KB/s"]]){if(x>=_u[0])return{x:x/_u[0],u:_u[1]}}return{x:x,u:"B/s"}};
      var _dr=_fr(nr),_dt=_fr(nt);_netLastFormatted.nv=_dr.x;_netLastFormatted.nu=_dr.u;_netLastFormatted.tv=_dt.x;_netLastFormatted.tu=_dt.u
    }
    if(_netLastFormatted.nv!==undefined){
      var _ne=document.getElementById("net_d");
      if(_ne){var _om=_ne.textContent.match(/^[\d.]+/);var _ou=_ne.textContent.replace(/^[\d.]+/,'');
      if(_om&&_ou!==_netLastFormatted.nu)ud("net_d",_netLastFormatted.nv.toFixed(1)+_netLastFormatted.nu);
      else animNum("net_d",_netLastFormatted.nv,_netLastFormatted.nu,1)}
    }else ud("net_d","-");
    if(_netLastFormatted.tv!==undefined){
      var _ne2=document.getElementById("net_u");
      if(_ne2){var _om2=_ne2.textContent.match(/^[\d.]+/);var _ou2=_ne2.textContent.replace(/^[\d.]+/,'');
      if(_om2&&_ou2!==_netLastFormatted.tu)ud("net_u",_netLastFormatted.tv.toFixed(1)+_netLastFormatted.tu);
      else animNum("net_u",_netLastFormatted.tv,_netLastFormatted.tu,1)}
    }else ud("net_u","-");
    // 总量由服务端统一推送（所有客户端一致）
    if(d.net_rx_total!==undefined){
      var _ft=function(x){if(x>=1073741824)return{x:x/1073741824,u:"GB"};return{x:x/1048576,u:"MB"}}
      var _rt=_ft(d.net_rx_total);animNum("net_total_dl",_rt.x," "+_rt.u+"↓",1);
      var _tt=_ft(d.net_tx_total);animNum("net_total_ul",_tt.x," "+_tt.u+"↑",1)
    }
  }else{ud("net_d","-");ud("net_u","-")}
  // IP 显示（从 d.ip/d.ip6 解析）
  var _ip4=document.getElementById("net_ip4");
  if(_ip4){
    var ips=(d.ip||"").split("\n").filter(function(s){return s&&s!="?"&&s!="-"});
    _ip4.textContent=ips.length?"IPv4: "+ips[0]:"-"
  }
  var _ip6=document.getElementById("net_ip6");
  if(_ip6){
    var ips6=(d.ip6||"").split("\n").filter(function(s){return s&&s!="?"&&s!="-"});
    var v6=ips6.length?ips6[0]:"-";
    // IPv6 地址分两行显示
    if(v6.length>20){var mid=Math.ceil(v6.length/2);v6=v6.substring(0,mid)+"<br>"+v6.substring(mid)}
    _ip6.innerHTML="IPv6: "+v6
  }
  
  // ── 网络图表插值 ──
  var _nr=0,_nt=0;
  function _rateToBytes(v,u){if(u=="KB/s")return v*1024;if(u=="MB/s")return v*1048576;if(u=="GB/s")return v*1073741824;return v}
  _nr=_netLastFormatted.nv!==undefined?_rateToBytes(_netLastFormatted.nv,_netLastFormatted.nu):0;
  _nt=_netLastFormatted.tv!==undefined?_rateToBytes(_netLastFormatted.tv,_netLastFormatted.tu):0;
  if(_nr!==_netInterp.to.rx||_nt!==_netInterp.to.tx){_netInterp.from={rx:_netInterp.to.rx,tx:_netInterp.to.tx};_netInterp.to={rx:_nr,tx:_nt};_netInterp.t0=performance.now()}
  
  // ── AP 后端 ──
  checkD();
  // AP 后端按钮始终可见，绿光/红光检测连通性
  
  // ── 进程列表：缓存解析结果+HTML，仅 ps_raw 或排序变化时重建 ──
  var procs;
  if(d.ps_raw!==_procCache.raw){
    _procCache.raw=d.ps_raw;
    _procCache.list=[];
    _procDirty=true;
    var _hidden=d._hidden_procs||{}, _adbPids=d._adb_pids||{}, _localPids=d._local_pids||{};
    if(d.ps_raw){
      var _plines=d.ps_raw.split("\n");
      if(_plines.length>0&&_plines[0].trim().startsWith("PID"))_plines=_plines.slice(1);
      for(var _l of _plines){
        _l=_l.trim();if(!_l)continue;
        var _a=_l.split(/\s+/);
        if(_a.length<4||!/^\d+$/.test(_a[0])||parseInt(_a[0])<=0)continue;
        if(_a[3].startsWith("[")||_a[3].startsWith("sh -c ps"))continue;
        var pid=_a[0],cpuPct=_a[1],rssStr=_a[2],cmdStr=_a.slice(3).join(" ").substring(0,80);
        var _hf=false;for(var _hk in _hidden){if(cmdStr.startsWith(_hk)||cmdStr.includes("/"+_hk)){_hf=true;break}}if(_hf)continue;
        var rssKb=/^\d+$/.test(rssStr)?parseInt(rssStr):0;
        var _al=(function(p,c){for(var _ch in _adbPids){if(String(_adbPids[_ch])===String(p))return"APPanel-"+_ch+"采集"}
          for(var _ch in _localPids){if(String(_localPids[_ch])===String(p))return"APPanel-"+_ch+"-shell"}
          if(c.includes("adb -s 127.0.0.1:5555"))return"APPanel-adb";
          if(c.startsWith("ps -e"))return"APPanel-ps";
          if(c.includes("gui.py"))return"APPanel-AP后端";return""})(pid,cmdStr);
        var appName=pkgMap[_a[3].split("/").pop()]||pkgMap[cmdStr.split(":")[0]]||_al||"";
        _procCache.list.push({p:pid,c:cpuPct,m:rssKb>=1024?(rssKb/1024).toFixed(1)+"M":rssKb+"K",mn:rssKb/1024,n:cmdStr.substring(0,30),cl:cmdStr,an:appName||cmdStr.split("/").pop().substring(0,20)})
      }
      if(d.self_pid){
        var _found=false;
        for(var _pi=0;_pi<_procCache.list.length;_pi++){
          if(_procCache.list[_pi].p==String(d.self_pid)){
            _procCache.list[_pi].an="APPanel-主进程";
            _found=true;
            break
          }
        }
        if(!_found){
          _procCache.list.push({p:String(d.self_pid),c:"0.5",m:d.self_rss_kb?fmtBytes(d.self_rss_kb*1024):"0K",mn:d.self_rss_kb/1024||0,n:"dashboard.py",cl:"dashboard.py",an:"APPanel-主进程"})
        }
      }
    }
  }
  procs=_procCache.list;
  // 排序（三态：默认→倒序→正序）
  var _sortKey=_so+","+_soDir;
  if(_sortKey!==_lastSortKey||_procDirty){
    _lastSortKey=_sortKey;
    _procDirty=false;
    if(_soDir!==0){
      var cols=[{k:"p",n:1},{k:"c",n:1},{k:"mn",n:1},{k:"an"},{k:"cl"}];
      procs.sort(function(a,b){
        var c=cols[_so],va=a[c.k],vb=b[c.k];
        if(c.n){var ma=parseFloat(va),mb=parseFloat(vb);if(isNaN(ma)||isNaN(mb))return 0;return _soDir===2?ma-mb:mb-ma}
        var r=String(va).localeCompare(String(vb));
        return _soDir===2?-r:r
      })
    }
    function _tblRows(arr){
      var h='';
      for(var i=0;i<100;i++){
        if(i<arr.length){var p=arr[i];h+='<tr class=procRow data-cl="'+e(p.cl||'')+'" style=cursor:pointer title="点击复制: '+e(p.cl||'')+'"><td class=p0>'+e(p.p)+'</td><td class=p1>'+e(p.c)+(p.c?'%':'')+'</td><td class=p2>'+e(p.m||'')+'</td><td class=p3>'+(p.an?e(p.an):'')+'</td><td class=p4>'+e(p.cl||'')+'</td></tr>'}
        else h+='<tr><td class=p0></td><td class=p1></td><td class=p2></td><td class=p3></td><td class=p4></td></tr>'
      }return h
    }
    _procHtmlCache.html=_tblRows(procs);
    _procHtmlCache.sortKey=_sortKey
  }
  document.getElementById("proc").innerHTML=_procHtmlCache.html;
  // 更新 bash shell 通道信息
  var _bi=document.getElementById("procBashInfo");
  if(_bi&&d._bash_procs){
    var _bp=d._bash_procs,_bh=[];
    for(var _ch in _bp){_bh.push('<span style="margin-right:8px">'+_ch+':<b style="margin:0 2px;font-weight:600">'+_bp[_ch].pid+'</b></span>')}
    _bi.innerHTML='<span style=opacity:.6>Shell通道:</span> '+_bh.join('');
    _bi.style.display='block'
  }else if(_bi){_bi.style.display='none'}
  var mpTable=document.getElementById("mproc");
  if(mpTable&&document.getElementById("floatOverlay").style.display==="flex")mpTable.innerHTML=_procHtmlCache.html;
  

}

function startNetLoop(){
  function tick(){
    var c=document.getElementById("netChart");
    if(!c){_netLoop=requestAnimationFrame(tick);return}
    // 60fps 时间插值：1000ms 内从旧值过渡到新值
    var _e=performance.now()-_netInterp.t0,_p=Math.min(_e/_netInterp.dur,1);
    var _cr=_netInterp.from.rx+(_netInterp.to.rx-_netInterp.from.rx)*_p;
    var _ct=_netInterp.from.tx+(_netInterp.to.tx-_netInterp.from.tx)*_p;
    _netHistory.push({rx:_cr,tx:_ct});
    if(_netHistory.length>_netMax)_netHistory.shift();
    // 绘制
    var W=c.width,H=c.height,ctx=c.getContext("2d");
    ctx.clearRect(0,0,W,H);
    if(_netHistory.length<2){_netLoop=requestAnimationFrame(tick);return}
    var mx=1;
    for(var i=0;i<_netHistory.length;i++){var r=_netHistory[i].rx,t=_netHistory[i].tx;if(r>mx)mx=r;if(t>mx)mx=t}
    function nu(v){if(v>=1048576)return{val:v/1048576,un:"MB"};if(v>=1024)return{val:v/1024,un:"KB"};return{val:v,un:"B"}}
    var du=nu(mx);mx=Math.ceil(du.val/.5)*.5;var uf={B:1,KB:1024,MB:1048576,GB:1073741824}[du.un]||1;
    var isLight=document.body.classList.contains("light");
    ctx.strokeStyle=isLight?"#d0d7de":"#30363d";ctx.lineWidth=.5;
    for(var i=0;i<=4;i++){var y=(H-15)*(1-i/4)+15;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
    ctx.fillStyle=isLight?"#656d76":"#8b949e";ctx.font="8px sans-serif";ctx.textAlign="left";
    ctx.fillText(du.un+"/s",2,10);ctx.fillText("0",2,H-4);
    function getPts(data){var pts=[];for(var i=0;i<_netHistory.length;i++){pts.push({x:(i/(_netHistory.length-1))*(W-2)+1,y:(H-15)*(1-data[i]/(mx*uf))+15})};return pts}
    function _cp(pts,i,o){
      var p=pts[i],pn=pts[Math.min(i+1,pts.length-1)],pp=pts[Math.max(i-1,0)];
      return o?{x:pn.x+(pts[Math.min(i+2,pts.length-1)].x-p.x)/6,y:pn.y+(pts[Math.min(i+2,pts.length-1)].y-p.y)/6}:{x:p.x+(pn.x-pp.x)/6,y:p.y+(pn.y-pp.y)/6}
    }
    function drawWave(pts,clr,fill){
      if(pts.length<2)return;
      if(fill){var grad=ctx.createLinearGradient(0,15,0,H-2);grad.addColorStop(0,clr+"50");grad.addColorStop(1,clr+"05");ctx.fillStyle=grad;ctx.beginPath();ctx.moveTo(pts[0].x,H-2);for(var i=0;i<pts.length-1;i++){var c1=_cp(pts,i,0),c2=_cp(pts,i,1);ctx.bezierCurveTo(c1.x,c1.y,c2.x,c2.y,pts[i+1].x,pts[i+1].y)};ctx.lineTo(pts[pts.length-1].x,H-2);ctx.closePath();ctx.fill()}
      ctx.strokeStyle=clr;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);for(var i=0;i<pts.length-1;i++){var c1=_cp(pts,i,0),c2=_cp(pts,i,1);ctx.bezierCurveTo(c1.x,c1.y,c2.x,c2.y,pts[i+1].x,pts[i+1].y)};ctx.stroke();var lp=pts[pts.length-1];ctx.fillStyle=clr;ctx.beginPath();ctx.arc(lp.x,lp.y,3,0,Math.PI*2);ctx.fill();ctx.globalAlpha=.3;ctx.beginPath();ctx.arc(lp.x,lp.y,6,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1
    }
    drawWave(getPts(_netHistory.map(function(p){return p.rx})),"#a78bfa",true);
    drawWave(getPts(_netHistory.map(function(p){return p.tx})),"#ef4444",false);
    _netLoop=requestAnimationFrame(tick)
  }
  _netLoop=requestAnimationFrame(tick)
}

// 移动端布局
if(window.innerWidth<=768){
  var _bmb=document.createElement("div");_bmb.className="bmb";_bmb.id="bmb";
  _bmb.innerHTML='<button id=mBtnTheme style=font-size:12px>☀️ 浅色</button><button id=mBtnCfg style=font-size:12px>设置</button><button id=mBtnAP style=max-width:none;flex:1.5>访问AzurPilot</button><button id=mBtnScr style=font-size:12px>访问息屏</button><button id=mBtnP>进程</button>';
  document.body.appendChild(_bmb)
}

// Startup
ws_connect();
checkD();
render();
// 初始化表头：CPU 降序（默认排序）
var _pb1=document.getElementById("pb1");if(_pb1){_pb1.className="on";_pb1.textContent="CPU ▼"}
var _mpb1=document.getElementById("mpb1");if(_mpb1){_mpb1.className="on";_mpb1.textContent="CPU ▼"}
startNetLoop();
setTimeout(function(){if(!_cache.cpu_jiffies)fetch("/api/all").then(function(r){return r.json()}).then(function(x){Object.assign(_cache,x);render()}).catch(function(e){})},3000);
</script>
